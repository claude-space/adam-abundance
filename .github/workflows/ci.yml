name: CI

# Gate for merges into main: the `test` job must pass (see branch protection).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    # Real Postgres so the DB-backed unit tests + the integration suite run for
    # real (not skipped). Matches the app's asyncpg URL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SWITCHBOARD_ENV: local
      DATABASE_URL: postgresql+asyncpg://switchboard:switchboard@localhost:5432/switchboard
      DB_STATEMENT_CACHE_SIZE: "0"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (app + data/research extras + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data,research,dev]"

      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: ruff check src tests

      - name: Migrate database
        run: alembic upgrade head

      - name: Tests + coverage (fails under floor)
        run: >-
          pytest -q
          --cov=switchboard
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=${{ env.COVERAGE_MIN }}
        env:
          # Floor sits just below the achieved coverage (~84% locally); raise it
          # as coverage grows. A PR that drops below this number fails the gate.
          COVERAGE_MIN: "80"

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore
