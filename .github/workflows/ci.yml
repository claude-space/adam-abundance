name: CI

# Gate for merges into main: the `test` job must pass (see branch protection).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    # Real Postgres so the DB-backed unit tests + the integration suite run for
    # real (not skipped). Matches the app's asyncpg URL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SWITCHBOARD_ENV: local
      DATABASE_URL: postgresql+asyncpg://switchboard:switchboard@localhost:5432/switchboard
      DB_STATEMENT_CACHE_SIZE: "0"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # uv resolves + installs the heavy data/research SDKs (bigquery, google-api,
      # gspread, trafilatura, …) in a few seconds vs ~20s for pip, and caches wheels.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install (app + data/research extras + dev)
        run: uv pip install --system -e ".[data,research,dev]"

      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: ruff check src tests

      - name: Migrate database
        run: alembic upgrade head

      # -n auto --dist loadscope: run test files across all runner cores, but keep
      # each module on ONE worker so the DB-backed suites (which isolate rows by a
      # per-module marker) never race each other. Verified stable across repeated
      # parallel runs. pytest-cov combines per-worker coverage automatically.
      - name: Tests + coverage (fails under floor)
        run: >-
          pytest -q -n auto --dist loadscope
          --cov=switchboard
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=${{ env.COVERAGE_MIN }}
        env:
          # Floor sits just below the coverage CI actually achieves (~77% on a
          # fresh empty DB; higher locally against a seeded DB). Raise as coverage
          # grows. A PR that drops below this number fails the gate.
          COVERAGE_MIN: "74"

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore
