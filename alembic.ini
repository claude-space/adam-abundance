# Alembic config for Switchboard's shared-memory schema.
# The DB URL is injected at runtime from the credentials/config layer
# (see migrations/env.py) — it is intentionally NOT hard-coded here so no
# connection string with a password lives in a committed file.
[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os
# sqlalchemy.url is set programmatically in migrations/env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
