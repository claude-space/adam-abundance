<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Switchboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap');
    :root { --accent:#c9a84c; --accent-2:#f0d78c; --ink:#f5f5f5; --muted:#6b6b6b;
            --surface-2:#1a1a1a; --line:rgba(255,255,255,.06); --line-2:rgba(255,255,255,.10); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
           font:14px/1.55 "Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           color:var(--ink); letter-spacing:-0.005em;
           background:
             radial-gradient(760px 420px at 50% -8%, color-mix(in srgb,var(--accent) 20%, transparent) 0%, transparent 62%),
             #0a0a0a; }
    .box { width:400px; max-width:92vw; text-align:center; padding:8px; }
    .mark { width:58px; height:58px; margin:0 auto 20px; display:grid; place-items:center; border-radius:16px;
            background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#0d0d0d; font-size:31px;
            box-shadow:0 0 40px rgba(201,168,76,.32); }
    h1 { margin:0 0 6px; font-family:"Sora",sans-serif; font-size:25px; font-weight:800; letter-spacing:-0.03em; }
    p.tag { color:var(--muted); margin:0 0 26px; }
    .panel { background:var(--surface-2); border:1px solid var(--line); border-radius:20px; padding:28px 24px;
             box-shadow:0 1px 2px rgba(0,0,0,.55), 0 14px 40px rgba(0,0,0,.35); }
    button { background:var(--accent); color:#0d0d0d; border:0; padding:12px 18px; border-radius:10px;
             font-family:"Manrope",sans-serif; font-weight:700; cursor:pointer; font-size:14px; width:100%;
             box-shadow:0 0 24px rgba(201,168,76,.18); }
    button:hover { filter:brightness(1.1); }
    .note { color:var(--muted); font-size:12px; margin-top:14px; }
    .brands { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:30px; }
    .plate { height:38px; padding:0 12px; border-radius:9px; display:grid; place-items:center;
             background:linear-gradient(135deg,#f7f5ef,#e9e5d8 55%,#d9d3bf); border:1px solid var(--line-2); }
    .plate img { height:22px; width:auto; object-fit:contain; }
    a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">◑</div>
    <h1>Switchboard</h1>
    <p class="tag">Orchestration &amp; shared memory for the Auto portfolio</p>
    <div class="panel">
      <p style="margin-top:0">Sign in with your Valnet Google account.</p>
      <a href="/auth/login"><button>Sign in with Google</button></a>
      {% if env == "local" %}<div class="note">Local environment — OAuth optional, <a href="/auth/dev-login">dev login</a> available.</div>{% endif %}
    </div>
    <div class="brands">
      <span class="plate"><img src="/static/brand-logos/hotcars.avif" alt="HotCars" onerror="this.parentElement.style.display='none'"/></span>
      <span class="plate"><img src="/static/brand-logos/carbuzz.avif" alt="CarBuzz" onerror="this.parentElement.style.display='none'"/></span>
      <span class="plate"><img src="/static/brand-logos/topspeed.avif" alt="TopSpeed" onerror="this.parentElement.style.display='none'"/></span>
    </div>
  </div>
</body>
</html>
